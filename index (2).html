<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; background: #000; font-family: sans-serif; position: relative; cursor: crosshair; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    #site-title {
      position: absolute;
      font-size: 2.5rem;
      font-weight: 700;
      color: #333;
      white-space: nowrap;
      z-index: 3;
      cursor: grab;
      user-select: none;
      outline: none;
      min-width: 10px;
    }
    #site-title:focus { color: #555; cursor: text; }
    #site-title.dragging { cursor: grabbing; }
    .ball { position: absolute; width: 140px; height: 140px; border-radius: 12px; overflow: hidden; border: 1px solid #222; pointer-events: none; z-index: 2; }
    .ball img { width: 100%; height: 100%; object-fit: cover; display: block; }
  </style>
</head>
<body>

  <canvas id="fx"></canvas>
  <h1 id="site-title" contenteditable="true" spellcheck="false">Click2Spawn&EditTitle,DragTitle</h1>

  <script>
    const canvas = document.getElementById('fx');
    const ctx = canvas.getContext('2d');
    const titleEl = document.getElementById('site-title');
    const W = 140, H = 140;
    const balls = [];
    const bursts = [];
    const COLORS = ['#ff4466','#ff9900','#44ddff','#aa44ff','#44ff99','#ff44cc','#ffee44'];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', () => { resize(); centerTitle(); });

    function centerTitle() {
      titleEl.style.left = (window.innerWidth  / 2 - titleEl.offsetWidth  / 2) + 'px';
      titleEl.style.top  = (window.innerHeight / 2 - titleEl.offsetHeight / 2) + 'px';
    }
    centerTitle();

    function getTitleRect() {
      return { x: titleEl.offsetLeft, y: titleEl.offsetTop, w: titleEl.offsetWidth, h: titleEl.offsetHeight };
    }

    let dragging = false, dragOffX = 0, dragOffY = 0, didDrag = false;

    titleEl.addEventListener('mousedown', e => {
      e.stopPropagation();
      dragging = true; didDrag = false;
      dragOffX = e.clientX - titleEl.offsetLeft;
      dragOffY = e.clientY - titleEl.offsetTop;
      titleEl.classList.add('dragging');
    });

    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      didDrag = true;
      let nx = e.clientX - dragOffX;
      let ny = e.clientY - dragOffY;
      nx = Math.max(0, Math.min(window.innerWidth  - titleEl.offsetWidth,  nx));
      ny = Math.max(0, Math.min(window.innerHeight - titleEl.offsetHeight, ny));
      titleEl.style.left = nx + 'px';
      titleEl.style.top  = ny + 'px';
    });

    document.addEventListener('mouseup', () => {
      if (dragging && !didDrag) titleEl.focus();
      dragging = false;
      titleEl.classList.remove('dragging');
    });

    titleEl.addEventListener('click', e => e.stopPropagation());
    titleEl.addEventListener('focus', () => titleEl.style.cursor = 'text');
    titleEl.addEventListener('blur',  () => titleEl.style.cursor = 'grab');

    function makeBurst(x, y) {
      bursts.push({ x, y, r: 0, alpha: 1, color: COLORS[Math.floor(Math.random() * COLORS.length)] });
    }

    function makeBall(sx, sy) {
      const el = document.createElement('div');
      el.className = 'ball';
      const img = document.createElement('img');
      img.src = 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSVtiLGKjAswRzE_MpKkXLNIO2ZHgm056Lvpw&s';
      img.alt = 'My image';
      el.appendChild(img);
      document.body.appendChild(el);
      const angle = Math.random() * Math.PI * 2;
      const speed = 3 + Math.random() * 2;
      balls.push({ el, x: sx - W/2, y: sy - H/2, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed });
    }

    document.body.addEventListener('click', e => {
      if (e.target === titleEl) return;
      makeBall(e.clientX, e.clientY);
    });

    makeBall(200, 150);

    function step() {
      const sw = window.innerWidth, sh = window.innerHeight;
      const t = getTitleRect();

      ctx.clearRect(0, 0, sw, sh);

      for (let i = bursts.length - 1; i >= 0; i--) {
        const b = bursts[i];
        b.r += 4; b.alpha -= 0.025;
        if (b.alpha <= 0) { bursts.splice(i, 1); continue; }
        const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
        grad.addColorStop(0, b.color + Math.floor(b.alpha * 255).toString(16).padStart(2, '0'));
        grad.addColorStop(1, b.color + '00');
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
      }

      for (const b of balls) {
        b.x += b.vx; b.y += b.vy;

        if (b.x <= 0)       { b.x = 0;      b.vx =  Math.abs(b.vx); makeBurst(0, b.y + H/2); }
        if (b.x + W >= sw)  { b.x = sw - W; b.vx = -Math.abs(b.vx); makeBurst(sw, b.y + H/2); }
        if (b.y <= 0)       { b.y = 0;      b.vy =  Math.abs(b.vy); makeBurst(b.x + W/2, 0); }
        if (b.y + H >= sh)  { b.y = sh - H; b.vy = -Math.abs(b.vy); makeBurst(b.x + W/2, sh); }

        const overlapX = b.x + W > t.x && b.x < t.x + t.w;
        const overlapY = b.y + H > t.y && b.y < t.y + t.h;

        if (overlapX && overlapY) {
          const prevX = b.x - b.vx, prevY = b.y - b.vy;
          const wasOutX = !(prevX + W > t.x && prevX < t.x + t.w);
          const wasOutY = !(prevY + H > t.y && prevY < t.y + t.h);
          const cx = b.x + W/2, cy = b.y + H/2;
          if (wasOutX) { b.vx = -b.vx; b.x = b.vx > 0 ? t.x + t.w : t.x - W; makeBurst(cx, cy); }
          else if (wasOutY) { b.vy = -b.vy; b.y = b.vy > 0 ? t.y + t.h : t.y - H; makeBurst(cx, cy); }
          else { b.vx = -b.vx; b.vy = -b.vy; makeBurst(cx, cy); }
        }

        b.el.style.left = b.x + 'px';
        b.el.style.top  = b.y + 'px';
      }

      requestAnimationFrame(step);
    }
    step();
  </script>

</body>
</html>
