<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #f5f5f5;
      font-family: sans-serif;
      position: relative;
      cursor: crosshair;
    }

    #title-block {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      z-index: 2;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 500;
      color: #1a1a1a;
    }

    .ball {
      position: absolute;
      width: 140px;
      height: 140px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #ccc;
      pointer-events: none;
    }

    .ball img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>

  <div id="title-block">
    <h1>click!</h1>
  </div>

  <script>
    const W = 140, H = 140;
    const balls = [];

    function makeBall(sx, sy) {
      const el = document.createElement('div');
      el.className = 'ball';
      const img = document.createElement('img');
      img.src = 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSVtiLGKjAswRzE_MpKkXLNIO2ZHgm056Lvpw&s';
      img.alt = 'My image';
      el.appendChild(img);
      document.body.appendChild(el);
      const angle = Math.random() * Math.PI * 2;
      const speed = 3 + Math.random() * 2;
      balls.push({ el, x: sx - W/2, y: sy - H/2, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed });
    }

    document.body.addEventListener('click', e => {
      makeBall(e.clientX, e.clientY);
    });

    makeBall(200, 150);

    function step() {
      const sw = window.innerWidth, sh = window.innerHeight;
      for (const b of balls) {
        b.x += b.vx; b.y += b.vy;
        if (b.x <= 0)       { b.x = 0;      b.vx =  Math.abs(b.vx); }
        if (b.x + W >= sw)  { b.x = sw - W; b.vx = -Math.abs(b.vx); }
        if (b.y <= 0)       { b.y = 0;      b.vy =  Math.abs(b.vy); }
        if (b.y + H >= sh)  { b.y = sh - H; b.vy = -Math.abs(b.vy); }
        b.el.style.left = b.x + 'px';
        b.el.style.top  = b.y + 'px';
      }
      requestAnimationFrame(step);
    }
    step();
  </script>

</body>
</html>
